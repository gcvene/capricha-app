# Rate limiting — 2 req/s por IP, burst de 20 (camada nginx antes do PHP)
limit_req_zone $binary_remote_addr zone=php_req:10m rate=2r/s;

server {
    listen 80 default_server;

    root /var/www/html;
    index index.php index.html;

    client_max_body_size 32M;

    # ── Security headers ────────────────────────────────────────────────────
    # NOTA: add_header não é herdado em blocos filho que já definem add_header.
    # Por isso os headers são repetidos nas locations /health e de estáticos.
    add_header X-Frame-Options            "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ── Health check (sem PHP, sem rate limit) ───────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type               "application/json"                        always;
        add_header X-Frame-Options            "SAMEORIGIN"                              always;
        add_header X-Content-Type-Options     "nosniff"                                 always;
        add_header X-XSS-Protection           "1; mode=block"                           always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"         always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains"     always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ── PHP — rate limit de camada 2 (app já faz 100 req/2min) ──────────────
    location ~ \.php$ {
        limit_req zone=php_req burst=20 nodelay;
        limit_req_status 429;

        fastcgi_pass 127.0.0.1:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_index index.php;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }

    # ── Estáticos — repete security headers pois define Cache-Control próprio ─
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control              "public, immutable"                       always;
        add_header X-Frame-Options            "SAMEORIGIN"                              always;
        add_header X-Content-Type-Options     "nosniff"                                 always;
        add_header X-XSS-Protection           "1; mode=block"                           always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"         always;
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains"     always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    }
}
