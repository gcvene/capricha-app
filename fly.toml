app = "capricha-app"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_LANGUAGE = "portuguese-br"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[mounts]]
  source = "capricha_storage"
  destination = "/var/www/html/storage"
