# fly.toml app configuration file generated for capricha-app on 2026-04-26T20:46:45-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'capricha-app'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_LANGUAGE = 'portuguese-br'

[[mounts]]
  source = 'capricha_storage'
  destination = '/var/www/html/storage'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '60s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
